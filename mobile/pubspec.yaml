name: audiscan
description: Asistente clínico con IA para otorrinolaringología.
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  # ── Estado y arquitectura ──────────────────────────────
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # ── Navegación ────────────────────────────────────────
  go_router: ^14.2.7

  # ── Supabase ──────────────────────────────────────────
  supabase_flutter: ^2.5.6

  # ── HTTP ──────────────────────────────────────────────
  dio: ^5.6.0

  # ── Almacenamiento local ──────────────────────────────
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # ── UI ────────────────────────────────────────────────
  cupertino_icons: ^1.0.8
  flutter_svg: ^2.0.10+1
  cached_network_image: ^3.4.1
  shimmer: ^3.0.0

  # ── Cámara e imágenes ─────────────────────────────────
  camera: ^0.11.0+2
  image_picker: ^1.1.2
  image: ^4.2.0

  # ── PDF ───────────────────────────────────────────────
  flutter_pdfview: ^1.3.2

  # ── Formularios y validación ──────────────────────────
  reactive_forms: ^17.0.1

  # ── Fechas ────────────────────────────────────────────
  intl: ^0.20.0

  # ── Íconos ────────────────────────────────────────────
  hugeicons: ^0.0.7

  # ── Teleconsulta ──────────────────────────────────────
  flutter_webrtc: ^1.4.1

  # ── Permisos ──────────────────────────────────────────
  permission_handler: ^11.3.1

  # ── Utilidades ────────────────────────────────────────
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  equatable: ^2.0.5
  logger: ^2.4.0
  uuid: ^4.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter

  # ── Code generation ───────────────────────────────────
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  freezed: ^2.5.7
  json_serializable: ^6.8.0

  # ── Linting ───────────────────────────────────────────
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  # fonts:
  #   - family: NombreFuente
  #     fonts:
  #       - asset: assets/fonts/NombreFuente-Regular.ttf