[pytest]
#  Configuración de pytest 

# Directorio de tests
testpaths = tests

# Modo async por defecto (para futuros tests de endpoints)
asyncio_mode = auto

# Formato de salida en consola
console_output_style = progress

# Marcadores personalizados del proyecto
markers =
    auth: Tests relacionados al módulo de autenticación
    citas: Tests relacionados al módulo de citas
    schemas: Tests de validación de schemas Pydantic
    integracion: Tests que requieren conexión a Supabase (excluir en CI local)

# Opciones por defecto al ejecutar pytest
# -v         : salida detallada (verbose)
# --tb=short : traceback corto en caso de fallo
addopts = -v --tb=short

# Ignorar warnings de librerías externas
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning